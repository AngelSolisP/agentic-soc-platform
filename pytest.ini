[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short

markers =
    integration: Integration tests (mock or live)
    mock: Runs in CI against mocked Chronicle/Firestore
    live: Requires real GCP credentials and NFR tenant (never runs in CI)
    eval: ADK agent evaluations (requires GOOGLE_API_KEY and Gemini access)
